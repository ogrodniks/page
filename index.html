<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sebastian | Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: #e2e8f0;
    overflow: hidden;
}

/* LAYOUT */
.main-layout {
    display: grid;
    grid-template-columns: 25% 75%;
    height: 100vh;
}

/* LEFT PANEL */
.left-panel {
    background: #020617;
    padding: 40px 20px;
    overflow-y: auto;
}

h1 {
    font-size: 40px;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    -webkit-background-clip: text;
    color: transparent;
}

.subtitle {
    color: #94a3b8;
}

/* GRID */
.grid {
    display: grid;
    gap: 15px;
    margin-top: 30px;
}

/* CARDS */
.card {
    background: rgba(30, 41, 59, 0.7);
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateX(5px);
    box-shadow: 0 0 15px rgba(59,130,246,0.3);
}

.big-card {
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    color: white;
}

/* RIGHT IMAGE */
.right-image {
    position: relative;
    background: url("assets/lacets.png") center/cover no-repeat;
    transition: 0.6s ease;
}

/* OVERLAY */
.right-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
}

/* FADE EFFECT */
.fade {
    opacity: 0;
}

.fade-in {
    opacity: 1;
}

/* PROJECT VIEW */
.project-view {
    position: absolute;
    top: 0;
    left: 25%;
    width: 75%;
    height: 100%;
    background: #020617;
    padding: 40px;
    display: none;
    overflow-y: auto;
}

.project-view.active {
    display: block;
}

.project-item {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.project-item a {
    color: #3b82f6;
    text-decoration: none;
}

.back-btn {
    margin-bottom: 20px;
    cursor: pointer;
    color: #3b82f6;
}
</style>
</head>

<body>

<div class="main-layout">

    <!-- LEFT -->
    <div class="left-panel">

        <h1>Sebastian</h1>
        <p class="subtitle">Data Analyst | Data Systems | Automation</p>

        <div class="grid">

            <div class="card big-card">
                Turning raw data into structured, reliable systems
            </div>

            <div class="card" onclick="changeImage('assets/sql.png')">
                <h3>SQL</h3>
            </div>

            <div class="card" onclick="openML(); changeImage('assets/lacets.png')">
                <h3>ML & Python</h3>
            </div>

            <div class="card" onclick="changeImage('assets/powerbi.png')">
                <h3>Power BI</h3>
            </div>

            <div class="card" onclick="changeImage('assets/other.png')">
                <h3>Other Projects</h3>
            </div>

        </div>

    </div>

    <!-- RIGHT IMAGE -->
    <div class="right-image" id="imageBox"></div>

</div>

<!-- ML VIEW -->
<div id="mlView" class="project-view">

    <div class="back-btn" onclick="goBack()">← Back</div>

    <h2>ML & Python Projects</h2>

    <div class="project-item">
        <h3>Subflash Classification Engine</h3>
        <p>Rule-based classification system with data quality layer</p>
        <a href="https://github.com/ogrodniks/ec_checks" target="_blank">
            View on GitHub →
        </a>
    </div>

</div>

<script>
function changeImage(path) {
    const el = document.getElementById("imageBox");

    el.classList.add("fade");

    setTimeout(() => {
        el.style.background = `url(${path}) center/cover no-repeat`;
        el.classList.remove("fade");
    }, 300);
}

function openML() {
    document.getElementById("mlView").classList.add("active");
}

function goBack() {
    document.getElementById("mlView").classList.remove("active");
}
</script>

</body>
</html>
